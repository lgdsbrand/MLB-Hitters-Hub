name: Daily Scraper Automation
on:
  schedule:
    # Runs at 12:00 AM, 6:30 AM, 8:30 AM, and 11:30 AM Eastern Standard Time (UTC-5)
    - cron: '0 5 * * *'
    - cron: '30 11 * * *'
    - cron: '30 13 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 curl_cffi

    - name: Run Scraper
      env:
        LAST7_HITTING_COOKIES_JSON: ${{ secrets.LAST7_HITTING_COOKIES_JSON }}
      run: |
        run_scraper() {
          local label="$1"
          shift
          if "$@"; then
            echo "[info] $label succeeded."
          else
            echo "[warn] $label failed. Keeping previous output as-is."
          fi
        }

        run_scraper "scrape_bvp"     python scraper/scrape_bvp.py  --url "https://www.fantasyinfocentral.com/mlb/daily-matchups"           --today-only --mode full
        sleep 35
        run_scraper "hit_pred"       python scraper/hit_pred.py     --url "https://www.fantasyinfocentral.com/betting/mlb/hit-predictions"   --today-only --mode full
        sleep 35
        run_scraper "hr_pred"        python scraper/hr_pred.py      --url "https://www.fantasyinfocentral.com/betting/mlb/hr-predictions"    --today-only --mode full
        sleep 35
        run_scraper "tb_pred"        python scraper/tb_pred.py      --url "https://www.fantasyinfocentral.com/betting/mlb/tb-predictions"    --today-only --mode full
        sleep 35
        run_scraper "last7_hitting"  python scraper/last7_hitting.py  --auto --mode full
        sleep 35
        run_scraper "last15_hitting" python scraper/last15_hitting.py --auto --mode full

        mv *.csv backend/ || true
        mv *.json backend/ || true

    - name: Commit and Push CSV changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add backend/*.csv backend/*.json || true

        git commit -m "Automated daily scrape update" || {
          echo "No changes to commit"
          exit 0
        }

        git push --force-with-lease origin main
